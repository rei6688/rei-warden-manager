services:
  # ── Vaultwarden ──────────────────────────────────────────────────────────────
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    volumes:
      - vw-data:/data
    environment:
      WEBSOCKET_ENABLED: "true"
      SIGNUPS_ALLOWED: "true"
    ports:
      - "8080:80"
    networks:
      - warden-net

  # ── Rei-Warden Backup Manager ─────────────────────────────────────────────────
  rei-warden-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rei-warden-manager
    restart: unless-stopped
    volumes:
      - vw-data:/vw-data:ro # Vaultwarden data (read-only for backup)
      - backups:/backups # Local backup staging
      - config:/app/config # Persistent settings & password hash
      - rclone-config:/root/.config/rclone # Rclone configuration
      - logs:/var/log # Log persistence
    environment:
      PORT: 3001
      # APP_PASSWORD is only used for the very first login if no settings exist.
      # To keep your local password, ensure your local 'settings.json' is in the 'config' volume.
      APP_SECRET_KEY: ${APP_SECRET_KEY:-Thanhnam0}
      JWT_SECRET: ${JWT_SECRET:-}
      DATA_DIR: /vw-data
      BACKUP_DIR: /backups
      LOG_FILE: /var/log/backup.log
      CONFIG_DIR: /app/config
      RCLONE_CONFIG_FILE: /root/.config/rclone/rclone.conf
    ports:
      - "3001:3001"
    networks:
      - warden-net
    depends_on:
      - vaultwarden

networks:
  warden-net:
    driver: bridge

volumes:
  vw-data:
    driver: local
  backups:
    driver: local
  config:
    driver: local
  rclone-config:
    driver: local
  logs:
    driver: local
